name: dbt test on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'dbt_olist/**'

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-snowflake==1.7.0

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          olist_snowflake_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.DBT_ACCOUNT }}
                user: ${{ secrets.DBT_USER }}
                password: ${{ secrets.DBT_PASSWORD }}
                role: OLIST_DBT
                database: ${{ secrets.DBT_DATABASE }}
                warehouse: ${{ secrets.DBT_WAREHOUSE }}
                schema: ${{ secrets.DBT_SCHEMA }}
                threads: 4
          EOF

      - name: dbt deps
        working-directory: dbt_olist
        run: dbt deps

      - name: dbt test
        working-directory: dbt_olist
        run: dbt test