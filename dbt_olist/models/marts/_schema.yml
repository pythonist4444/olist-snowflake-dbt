version: 2

models:
  - name: dim_customers
    description: "One row per customer with order history and segmentation"
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: customer_unique_id
        data_tests:
          - not_null
      - name: customer_state
        data_tests:
          - not_null
      - name: customer_segment
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - loyal
                  - returning
                  - one_time
                  - no_orders

  - name: dim_products
    description: "One row per product with category and sales metrics"
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
      - name: product_category_name_en
        data_tests:
          - not_null

  - name: dim_sellers
    description: "One row per seller with location and performance metrics"
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique
      - name: seller_state
        data_tests:
          - not_null

  - name: dim_date
    description: "Date spine from 2016-01-01 to 2019-12-31"
    columns:
      - name: date_day
        data_tests:
          - not_null
          - unique

  - name: fct_orders
    description: "One row per order. Grain is order_id. Joins orders with payments, delivery metrics, customer location and order item totals."
    columns:
      - name: order_id
        description: "Primary Key"
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: "Foreign key to dim_customers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_status
        description: "Final status of the order"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - delivered
                  - shipped
                  - canceled
                  - unavailable
                  - invoiced
                  - processing
                  - created
                  - approved
      - name: delivery_status
        description: "status of the order delivery"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - late
                  - on_time
                  - unknown
      - name: order_date_day
        description: "Date the order was placed — foreign key to dim_date"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
      - name: order_purchased_at
        description: "Timestamp when the order was placed"
      - name: order_month
        description: "Truncated to month — used for time series analysis"
      - name: total_items
        description: "Number of items in the order"
      - name: total_items_value
        description: "Sum of item prices excluding freight"
      - name: total_freight_value
        description: "Total freight cost for the order"
      - name: total_order_value
        description: "Total items value plus freight"
      - name: total_payment_value
        description: "Total amount paid including all payment methods"
      - name: review_score
        description: "Customer review score 1-5"
      - name: actual_delivery_days
        description: "Days from purchase to delivery"
      - name: estimated_delivery_days
        description: "Days from purchase to estimated delivery"
      - name: delivery_delay_days
        description: "Positive means late, negative means early"
      - name: delivery_status
        description: "on_time if delivered before or on estimated date, late if after"