version: 2

models:
  - name: dim_customers
    description: "One row per customer with order history and segmentation"
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: customer_unique_id
        data_tests:
          - not_null
      - name: customer_state
        data_tests:
          - not_null
      - name: customer_segment
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - loyal
                  - returning
                  - one_time
                  - no_orders

  - name: dim_products
    description: "One row per product with category and sales metrics"
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
      - name: product_category_name_en
        data_tests:
          - not_null

  - name: dim_sellers
    description: "One row per seller with location and performance metrics"
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique
      - name: seller_state
        data_tests:
          - not_null

  - name: dim_date
    description: "Date spine from 2016-01-01 to 2019-12-31"
    columns:
      - name: date_day
        data_tests:
          - not_null
          - unique

  - name: fct_orders
    description: "One row per order — grain is order_id"
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - delivered
                  - shipped
                  - canceled
                  - unavailable
                  - invoiced
                  - processing
                  - created
                  - approved
      - name: delivery_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - late
                  - on_time
                  - unknown
      - name: order_date_day
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day