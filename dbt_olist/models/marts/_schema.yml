version: 2

models:
  - name: dim_customers
    description: "One row per customer with order history and segmentation"
    columns:
      - name: customer_id
        description: "Primary key — unique identifier for each customer order profile"
        data_tests:
          - not_null
          - unique
      - name: customer_unique_id
        description: "Unique identifier for the actual customer — one person may have multiple customer_ids"
        data_tests:
          - not_null
      - name: customer_zip_code
        description: "Customer zip code prefix"
      - name: customer_city
        description: "Customer city — lowercased and trimmed"
      - name: customer_state
        description: "Two letter Brazilian state code — uppercased"
        data_tests:
          - not_null
      - name: total_orders
        description: "Total number of orders placed by this customer"
      - name: first_order_at
        description: "Timestamp of the customer's first order"
      - name: last_order_at
        description: "Timestamp of the customer's most recent order"
      - name: customer_segment
        description: "Segmentation based on order frequency — loyal (3+), returning (2), one_time (1), no_orders (0)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - loyal
                  - returning
                  - one_time
                  - no_orders

  - name: dim_products
    description: "One row per product with category and sales metrics"
    columns:
      - name: product_id
        description: "Primary key — unique identifier for each product"
        data_tests:
          - not_null
          - unique
      - name: product_category_name_pt
        description: "Product category name in Portuguese as it appears in the raw data"
      - name: product_category_name_en
        description: "Product category name translated to English"
        data_tests:
          - not_null
      - name: product_weight_g
        description: "Product weight in grams"
      - name: product_length_cm
        description: "Product length in centimetres"
      - name: product_height_cm
        description: "Product height in centimetres"
      - name: product_width_cm
        description: "Product width in centimetres"
      - name: product_photos_qty
        description: "Number of product photos published"
      - name: times_ordered
        description: "Total number of times this product has been ordered"
      - name: total_revenue
        description: "Total revenue generated by this product across all orders"
      - name: avg_price
        description: "Average selling price of this product across all orders"

  - name: dim_sellers
    description: "One row per seller with location and performance metrics"
    columns:
      - name: seller_id
        description: "Primary key — unique identifier for each seller"
        data_tests:
          - not_null
          - unique
      - name: seller_zip_code
        description: "Seller zip code prefix"
      - name: seller_city
        description: "Seller city — lowercased and trimmed"
      - name: seller_state
        description: "Two letter Brazilian state code — uppercased"
        data_tests:
          - not_null
      - name: total_orders
        description: "Total number of orders fulfilled by this seller"
      - name: total_revenue
        description: "Total revenue generated by this seller across all orders"
      - name: avg_order_value
        description: "Average order value for this seller"
      - name: distinct_products_sold
        description: "Number of distinct products sold by this seller"

  - name: dim_date
    description: "Date spine covering 2016-01-01 to 2019-12-31 — one row per day"
    columns:
      - name: date_day
        description: "Primary key — the calendar date"
        data_tests:
          - not_null
          - unique
      - name: year
        description: "Calendar year"
      - name: month
        description: "Calendar month number 1-12"
      - name: day_of_month
        description: "Day number within the month"
      - name: day_of_week
        description: "Day of week as a number"
      - name: day_name
        description: "Full name of the day e.g. Monday"
      - name: month_name
        description: "Full name of the month e.g. January"
      - name: quarter
        description: "Calendar quarter 1-4"
      - name: week_of_year
        description: "Week number within the year"
      - name: is_weekend
        description: "True if the date falls on a Saturday or Sunday"
      - name: year_month
        description: "Year and month formatted as YYYY-MM — useful for time series grouping"

  - name: fct_orders
    description: "One row per order. Grain is order_id. Joins orders with payments, delivery metrics, customer location and order item totals."
    columns:
      - name: order_id
        description: "Primary key — unique identifier for each order"
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: "Foreign key to dim_customers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_status
        description: "Final status of the order"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - delivered
                  - shipped
                  - canceled
                  - unavailable
                  - invoiced
                  - processing
                  - created
                  - approved
      - name: order_purchased_at
        description: "Timestamp when the customer placed the order"
      - name: order_approved_at
        description: "Timestamp when payment was approved"
      - name: order_delivered_carrier_at
        description: "Timestamp when the order was handed to the carrier"
      - name: order_delivered_customer_at
        description: "Timestamp when the order was delivered to the customer"
      - name: order_estimated_delivery_at
        description: "Estimated delivery date shown to the customer at time of purchase"
      - name: order_month
        description: "Order purchase date truncated to month — used for time series analysis"
      - name: order_date_day
        description: "Date the order was placed — foreign key to dim_date"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
      - name: customer_city
        description: "City of the customer who placed the order"
      - name: customer_state
        description: "Brazilian state of the customer who placed the order"
      - name: total_items
        description: "Total number of items in the order"
      - name: total_items_value
        description: "Sum of all item prices in the order excluding freight"
      - name: total_freight_value
        description: "Total freight cost across all items in the order"
      - name: total_order_value
        description: "Total items value plus freight"
      - name: total_payment_value
        description: "Total amount paid including all payment methods"
      - name: max_payment_installments
        description: "Maximum number of installments used across all payments for this order"
      - name: payment_types_used
        description: "Comma separated list of payment types used e.g. credit_card, voucher"
      - name: review_score
        description: "Customer review score between 1 and 5"
      - name: actual_delivery_days
        description: "Number of days from order purchase to delivery to customer"
      - name: estimated_delivery_days
        description: "Number of days from order purchase to estimated delivery date"
      - name: delivery_delay_days
        description: "Difference between actual and estimated delivery — positive means late, negative means early"
      - name: delivery_status
        description: "on_time if delivered on or before estimated date, late if after, unknown if delivery date is null"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - late
                  - on_time
                  - unknown