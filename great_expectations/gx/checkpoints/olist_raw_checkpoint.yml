name: olist_raw_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint

validations:
  - batch_request:
      datasource_name: olist_snowflake
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: raw.orders
    expectation_suite_name: olist_raw_orders

  - batch_request:
      datasource_name: olist_snowflake
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: raw.order_items
    expectation_suite_name: olist_raw_order_items

run_name_template: "%Y%m%d-%H%M%S-olist-raw-validation"
action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction